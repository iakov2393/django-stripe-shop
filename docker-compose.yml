version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stripe_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: stripe_shop
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "python manage.py migrate && gunicorn stripe_shop.wsgi:application --bind 0.0.0.0:8000"
version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stripe_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
    depends_on:
      - db